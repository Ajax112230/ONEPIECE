<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>寻色 · 中国传统色</title>
<style>
/* === Reset & Root === */
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --gold: #c9a96e;
  --gold-dim: #8b7355;
  --ink: #0d0d0d;
  --paper: #f0e6d3;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-top: env(safe-area-inset-top, 0px);
}

/* === Base === */
html {
  -webkit-tap-highlight-color: transparent;
  -webkit-text-size-adjust: 100%;
  touch-action: manipulation;
}

body {
  background: var(--ink); color: #e8dcc8;
  font-family: 'PingFang SC','Microsoft YaHei',sans-serif;
  width: 100vw;
  height: 100vh;
  height: 100dvh; /* dynamic viewport — handles mobile Safari URL bar */
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* === Canvas === */
canvas {
  position: fixed; top:0; left:0; z-index:0;
  width:100%; height:100%;
}

/* ═══════════════════════════════════════════
   INPUT SCREEN
   ═══════════════════════════════════════════ */
#input-screen {
  position: fixed;
  top: var(--safe-top); left: 0;
  z-index: 1;
  width: 100%;
  height: 100%;
  height: 100dvh;
  display: flex; align-items: center; justify-content: center;
  padding: var(--safe-top) 0 var(--safe-bottom);
  transition: opacity 0.6s, transform 0.6s;
}
#input-screen.hide { opacity:0; transform:scale(1.05); pointer-events:none; }

.center {
  text-align: center;
  padding: 1.5rem;
  max-width: 100%;
}

.title {
  font-size: clamp(2.2rem, 8vw, 5rem);
  letter-spacing: 0.3em;
  color: var(--paper);
  text-shadow: 0 0 60px rgba(201,169,110,0.3);
  margin-bottom: 0.2em;
}

.sub {
  font-size: clamp(0.85rem, 2.5vw, 1rem);
  color: #a09880;
  letter-spacing: 0.2em;
  margin-bottom: 2rem;
}

/* Input row */
.row {
  display: flex;
  max-width: min(360px, 90vw);
  margin: 0 auto;
  border: 1px solid var(--gold-dim);
  border-radius: 4px;
  overflow: hidden;
  transition: border-color 0.3s, box-shadow 0.3s;
}
.row:focus-within {
  border-color: var(--gold);
  box-shadow: 0 0 20px rgba(201,169,110,0.15);
}

#name-input {
  flex: 1; min-width: 0;
  background: rgba(0,0,0,0.5);
  border: none; outline: none;
  padding: 0.9rem 1rem;
  font-size: clamp(1rem, 3vw, 1.1rem);
  color: var(--paper);
  letter-spacing: 0.15em;
  -webkit-appearance: none;
  border-radius: 0;
}
#name-input::placeholder { color: #a09880; opacity: 0.6; }

#search-btn {
  background: var(--gold-dim);
  border: none;
  padding: 0 1.5rem;
  font-size: clamp(1rem, 3vw, 1.1rem);
  color: var(--ink);
  letter-spacing: 0.2em;
  cursor: pointer;
  white-space: nowrap;
  touch-action: manipulation;
  transition: background 0.2s, transform 0.15s;
  -webkit-user-select: none;
  user-select: none;
}
#search-btn:active { background: var(--gold); transform: scale(0.96); }

.hint {
  margin-top: 1.5rem;
  font-size: clamp(0.75rem, 2vw, 0.85rem);
  color: #a09880;
  opacity: 0.6;
  letter-spacing: 0.1em;
}

/* ═══════════════════════════════════════════
   RESULT SCREEN
   ═══════════════════════════════════════════ */
@keyframes paperFadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}

#result-screen {
  position: fixed;
  top: 0; left: 0; z-index: 1;
  width: 100%;
  height: 100%;
  height: 100dvh;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: var(--safe-top) 1rem var(--safe-bottom);
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  /* Background image with dark overlay for readability */
  background-image: url('assets/11.jpg');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  animation: paperFadeIn 0.8s ease;
}
/* Override text colors for image-background mode */
#color-name { color: #f0e6d3; }
#color-hex, #color-rgb { color: #d5cbb5; }
#color-poem { border-top-color: rgba(255,255,255,0.15); border-bottom-color: rgba(255,255,255,0.15); }
#poem-text { color: #e8ddc8; }
#poem-source { color: #c5b898; }
#retry-btn { color: #d5cbb5; border-color: rgba(255,255,255,0.3); }
#retry-btn:active { color: #0d0d0d; background: rgba(255,255,255,0.25); }
#result-screen.visible { display: flex; }

/* Color card — 苏绣质感 */
#color-card {
  width: min(72vw, 380px);
  height: min(72vw, 380px);
  position: relative;
  margin-bottom: 1.5rem;
  flex-shrink: 0;
  /* 绣绷 — 圆形刺绣纹样 */
  border-radius: 50%;
  background: var(--ink-color, #333);
  transition: background 0.8s, filter 0.8s, box-shadow 0.8s;
  filter: saturate(1.12) contrast(1.03);
  box-shadow:
    /* 绣面微微隆起的光影 */
    0 0 0 6px rgba(255,255,255,0.015),
    0 0 0 5px rgba(0,0,0,0.04),
    0 0 0 7px rgba(255,255,255,0.01),
    0 0 0 8px rgba(0,0,0,0.03),
    0 0 0 10px rgba(255,255,255,0.01),
    /* 外光晕 */
    0 0 50px var(--ink-glow, rgba(201,169,110,0.2)),
    0 0 100px var(--ink-glow, rgba(201,169,110,0.08)),
    /* 绣绷投影 */
    10px 8px 30px rgba(0,0,0,0.2),
    -6px -4px 20px rgba(0,0,0,0.1);
}

/* 底层：绢帛底纹 — 极细经纬交织 */
#color-card::before {
  content: '';
  position: absolute; inset: 0;
  border-radius: 50%;
  background:
    /* 经线 */
    repeating-linear-gradient(
      0deg,
      transparent 0px,
      transparent 1px,
      rgba(255,255,255,0.018) 1px,
      rgba(255,255,255,0.018) 1.5px
    ),
    /* 纬线 */
    repeating-linear-gradient(
      90deg,
      transparent 0px,
      transparent 1px,
      rgba(0,0,0,0.012) 1px,
      rgba(0,0,0,0.012) 1.5px
    ),
    /* 微织纹 — 斜纹 */
    repeating-linear-gradient(
      30deg,
      transparent 0px,
      transparent 8px,
      rgba(255,255,255,0.008) 8px,
      rgba(255,255,255,0.008) 8.5px
    ),
    /* 微织纹 — 反向 */
    repeating-linear-gradient(
      150deg,
      transparent 0px,
      transparent 12px,
      rgba(0,0,0,0.008) 12px,
      rgba(0,0,0,0.008) 12.5px
    ),
    /* 丝光底色渐变 */
    linear-gradient(
      135deg,
      rgba(255,255,255,0.10) 0%,
      rgba(255,255,255,0.03) 25%,
      transparent 45%,
      rgba(0,0,0,0.02) 55%,
      rgba(0,0,0,0.06) 85%,
      rgba(255,255,255,0.02) 100%
    );
  pointer-events: none;
}

/* 中层：绣线纹理 — 密实 satin stitch */
#color-card::after {
  content: '';
  position: absolute; inset: 0;
  border-radius: 50%;
  background:
    /* 主针迹 — 细密 15° 斜纹绣线 */
    repeating-linear-gradient(
      15deg,
      transparent 0px,
      transparent 1.5px,
      rgba(255,255,255,0.035) 1.5px,
      rgba(255,255,255,0.035) 2px
    ),
    /* 副针迹 — 20° 微偏移叠加，模拟丝线交错深浅 */
    repeating-linear-gradient(
      20deg,
      transparent 0px,
      transparent 0.8px,
      rgba(255,255,255,0.018) 0.8px,
      rgba(255,255,255,0.018) 1.2px
    ),
    /* 绣线起伏暗纹 */
    repeating-linear-gradient(
      15deg,
      transparent 0px,
      transparent 4px,
      rgba(0,0,0,0.04) 4px,
      rgba(0,0,0,0.04) 4.5px
    ),
    /* 丝线高光带 — 左上到右下 */
    linear-gradient(
      150deg,
      rgba(255,255,255,0.18) 0%,
      rgba(255,255,255,0.10) 15%,
      rgba(255,255,255,0.02) 35%,
      transparent 50%,
      rgba(0,0,0,0.04) 65%,
      rgba(0,0,0,0.10) 100%
    ),
    /* 第二高光 — 柔光漫反射 */
    radial-gradient(
      ellipse 50% 40% at 35% 30%,
      rgba(255,255,255,0.08) 0%,
      transparent 70%
    );
  pointer-events: none;
}

/* 针脚纹路叠加层 — 用内嵌 box-shadow 画锁边 */
#color-card .stitch-border {
  display: none;
}

/* Color info */
#color-name {
  font-size: clamp(1.8rem, 5vw, 3.5rem);
  letter-spacing: 0.25em;
  color: #4a3a2a;
  margin-bottom: 0.2rem;
  text-align: center;
}

#color-hex, #color-rgb {
  font-size: 0.9rem;
  color: #7a6a55;
  letter-spacing: 0.1em;
  margin-top: 0.3rem;
}

#color-poem {
  margin-top: 1.5rem;
  padding: 1rem 1.5rem;
  border-top: 1px solid rgba(139,115,85,0.25);
  border-bottom: 1px solid rgba(139,115,85,0.25);
  max-width: 90vw;
}

#poem-text {
  font-size: clamp(0.9rem, 2.5vw, 1.05rem);
  font-style: italic;
  line-height: 1.7;
  color: #5a4a35;
}

#poem-source {
  font-size: 0.8rem;
  color: #8a7a65;
  margin-top: 0.5rem;
  display: block;
}

#retry-btn {
  margin-top: 1.8rem;
  background: transparent;
  border: 1px solid var(--gold-dim);
  color: #6b5335;
  padding: 0.6rem 2rem;
  font-size: 1rem;
  letter-spacing: 0.15em;
  cursor: pointer;
  touch-action: manipulation;
  transition: all 0.2s;
  -webkit-user-select: none;
  user-select: none;
  flex-shrink: 0;
}
#retry-btn:active {
  background: var(--gold-dim);
  color: #f7f1e3;
  transform: scale(0.96);
}

/* ═══════════════════════════════════════════
   RESPONSIVE — MOBILE (< 600px)
   ═══════════════════════════════════════════ */
@media (max-width: 600px) {
  /* Stack input vertically */
  .row {
    flex-direction: column;
    border-radius: 6px;
  }
  #name-input {
    padding: 0.85rem 1rem;
    text-align: center;
  }
  #search-btn {
    padding: 0.75rem;
    font-size: 1rem;
  }

  /* Shrink color card */
  #color-card {
    width: min(60vw, 260px);
    height: min(60vw, 260px);
    margin-bottom: 1.2rem;
  }

  /* Tighter text spacing */
  .center { padding: 1rem; }
  .title { letter-spacing: 0.2em; }
  .sub { margin-bottom: 1.5rem; }

  #result-screen {
    justify-content: flex-start;
    padding-top: calc(var(--safe-top) + 2rem);
    padding-bottom: calc(2rem + var(--safe-bottom));
  }

  #color-poem {
    padding: 0.8rem 1.2rem;
  }

  #retry-btn {
    margin-bottom: calc(1rem + var(--safe-bottom));
  }
}

/* ═══════════════════════════════════════════
   SMALL PHONES (< 380px, e.g. iPhone SE)
   ═══════════════════════════════════════════ */
@media (max-width: 380px) {
  .title { font-size: 1.8rem; letter-spacing: 0.15em; }
  .sub { font-size: 0.8rem; }

  #color-card {
    width: 55vw;
    height: 55vw;
    margin-bottom: 1rem;
  }

  #color-name { font-size: 1.5rem; letter-spacing: 0.15em; }

  #color-poem { padding: 0.7rem 1rem; }
  #poem-text { font-size: 0.85rem; line-height: 1.6; }
}

/* ═══════════════════════════════════════════
   LANDSCAPE — MOBILE
   ═══════════════════════════════════════════ */
@media (max-height: 500px) and (orientation: landscape) {
  #input-screen {
    align-items: flex-start;
    padding-top: 1rem;
  }

  .sub { margin-bottom: 1rem; }
  .hint { margin-top: 0.8rem; }

  #result-screen {
    flex-direction: row;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
    gap: 1rem;
    padding: 1rem;
  }

  #color-card {
    width: min(40vh, 200px);
    height: min(40vh, 200px);
    margin-bottom: 0;
  }

  #color-poem {
    margin-top: 0.8rem;
    padding: 0.5rem 1rem;
  }

  #retry-btn {
    margin-top: 1rem;
  }
}

/* ═══════════════════════════════════════════
   TABLET (601px — 1024px)
   ═══════════════════════════════════════════ */
@media (min-width: 601px) and (max-width: 1024px) {
  #color-card {
    width: min(50vw, 340px);
    height: min(50vw, 340px);
  }

  #color-poem { max-width: min(80vw, 500px); }

  #result-screen {
    justify-content: flex-start;
    padding-top: 4rem;
  }
}

/* ═══════════════════════════════════════════
   DESKTOP HOVER (non-touch only)
   ═══════════════════════════════════════════ */
@media (hover: hover) and (pointer: fine) {
  #search-btn:hover { background: var(--gold); color: #000; }
  #retry-btn:hover { background: var(--gold-dim); color: #f7f1e3; }
}

/* ═══════════════════════════════════════════
   ANIMATIONS
   ═══════════════════════════════════════════ */
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-6px); }
  40% { transform: translateX(6px); }
  60% { transform: translateX(-4px); }
  80% { transform: translateX(4px); }
}

#name-input.shake {
  animation: shake 0.5s ease;
}
</style>
</head>
<body>

<div id="input-screen">

    <div class="row">

</div>

// === HASH ===
function getColor(name) {
  var s = (name || '').trim();
  if (!s) return COLORS[Math.floor(COLORS.length*0.618)];
  var h = 5381;
  for (var i = 0; i < s.length; i++) { h = ((h<<5)+h+s.charCodeAt(i)) & 0x7fffffff; }
  return COLORS[h % COLORS.length];
}

// === SIMPLE PARTICLES ===
(function(){
  var cv = document.getElementById('bg-canvas');
  var ctx = cv.getContext('2d');
  var ps = [];
  var cr=201,cg=169,cb=110;

  function rs() { cv.width=window.innerWidth; cv.height=window.innerHeight; }
  rs(); window.addEventListener('resize',rs);

  for (var i=0;i<55;i++) {
    ps.push({
      x:Math.random()*cv.width, y:Math.random()*cv.height,
      vx:(Math.random()-0.5)*0.35, vy:(Math.random()-0.5)*0.35,
      sz:Math.random()*2+0.5, op:Math.random()*0.25+0.04,
      ph:Math.random()*Math.PI*2
    });
  }

  function lp() {
    ctx.clearRect(0,0,cv.width,cv.height);
    var t=Date.now()*0.001;
    for (var i=0;i<ps.length;i++) {
      var p=ps[i];
      p.x+=p.vx; p.y+=p.vy;
      if (p.x<-20) p.x=cv.width+20;
      if (p.x>cv.width+20) p.x=-20;
      if (p.y<-20) p.y=cv.height+20;
      if (p.y>cv.height+20) p.y=-20;
      p.vx*=0.9995; p.vy*=0.9995;
      var rr=Math.round(cr+Math.sin(p.ph+t)*25);
      var gg=Math.round(cg+Math.cos(p.ph+t*1.3)*25);
      var bb=Math.round(cb+Math.sin(p.ph+t*0.7)*25);
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.sz,0,Math.PI*2);
      ctx.fillStyle='rgba('+Math.max(0,Math.min(255,rr))+','+Math.max(0,Math.min(255,gg))+','+Math.max(0,Math.min(255,bb))+','+p.op+')';
      ctx.fill();
    }
    requestAnimationFrame(lp);
  }
  lp();

  window.updParticles = function(hx) {
    cr=parseInt(hx.slice(1,3),16);
    cg=parseInt(hx.slice(3,5),16);
    cb=parseInt(hx.slice(5,7),16);
    for (var i=0;i<ps.length;i++) { ps[i].vx+=(Math.random()-0.5)*1.2; ps[i].vy+=(Math.random()-0.5)*1.2; }
  };
})();

// === MAIN ===
(function(){
  var scrIn = document.getElementById('input-screen');
  var scrOut = document.getElementById('result-screen');
  var inp = document.getElementById('name-input');
  var btn = document.getElementById('search-btn');
  var retry = document.getElementById('retry-btn');
  var card = document.getElementById('color-card');
  var cname = document.getElementById('color-name');
  var chex = document.getElementById('color-hex');
  var crgb = document.getElementById('color-rgb');
  var poem = document.getElementById('poem-text');
  var psrc = document.getElementById('poem-source');

  function showColor(name) {
    var c = getColor(name);

    card.style.setProperty('--ink-color', c.hex);
    card.style.setProperty('--ink-glow', 'rgba('+c.r+','+c.g+','+c.b+',0.35)');
    cname.textContent = c.name;
    chex.textContent = c.hex;
    crgb.textContent = 'RGB('+c.r+', '+c.g+', '+c.b+')';
    poem.textContent = '「'+c.poem+'」';

    var parts = [c.poet];
    if (c.dynasty && c.dynasty !== '—') parts.push(c.dynasty);
    if (c.source) parts.push('《'+c.source+'》');
    psrc.textContent = '—— ' + parts.join(' · ');

    updParticles(c.hex);

    // Switch screens
    scrIn.classList.add('hide');
    scrOut.classList.add('visible');

    // Bloom animation
    card.style.transition = 'none';
    card.style.transform = 'scale(0.3)';
    card.style.opacity = '0';

    requestAnimationFrame(function(){
      requestAnimationFrame(function(){
        card.style.transition = 'transform 0.7s cubic-bezier(0.22,0.61,0.36,1), opacity 0.5s';
        card.style.transform = 'scale(1)';
        card.style.opacity = '1';
      });
    });
  }

  function showInput() {
    scrOut.classList.remove('visible');
    scrIn.classList.remove('hide');
    inp.value = '';
    inp.focus();
    updParticles('#C9A96E');
  }

  function search() {
    var name = inp.value.trim();
    if (!name) {
      inp.classList.add('shake');
      setTimeout(function(){ inp.classList.remove('shake'); }, 500);
      inp.focus();
      return;
    }
    showColor(name);
  }

  btn.addEventListener('click', search);
  btn.addEventListener('touchend', function(e){ e.preventDefault(); search(); });
  inp.addEventListener('keydown', function(e){ if(e.key==='Enter') { e.preventDefault(); search(); } });
  retry.addEventListener('click', showInput);
  inp.focus();
})();
</script>
